<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Affiliate Hub | onlymatt</title>
    <meta
      name="description"
      content="Hub responsive pour gerer rapidement les informations de publication de tes affiliates."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <header class="hero">
      <div class="hero__inner container">
        <p class="eyebrow">onlymatt</p>
        <h1>Affiliate Operations Hub</h1>
        <p class="hero__lead">
          Hub central des liens promo et codes fan.
        </p>

        <div class="controls">
          <div class="category-filter" id="categoryFilter" aria-label="Filtre par categorie">
            <button type="button" class="cat-btn cat-btn--all is-active" data-category="all">Tout</button>
            <span class="cat-chips" id="categoryChips"></span>
          </div>

          <div class="control-group private-control">
            <label for="searchInput">Search</label>
            <input
              id="searchInput"
              type="search"
              placeholder="Nom, tags, niche..."
              autocomplete="off"
            />
          </div>

          <div class="control-group private-control">
            <label for="platformFilter">Platform</label>
            <select id="platformFilter">
              <option value="all">All</option>
              <option value="instagram">Instagram</option>
              <option value="tiktok">TikTok</option>
              <option value="x">X</option>
            </select>
          </div>

          <div class="control-group private-control">
            <label for="nicheFilter">Niche</label>
            <select id="nicheFilter">
              <option value="all">All</option>
              <option value="fitness">Fitness</option>
              <option value="business">Business</option>
              <option value="lifestyle">Lifestyle</option>
            </select>
          </div>

          <div class="control-group private-control">
            <label for="formatFilter">Format</label>
            <select id="formatFilter">
              <option value="all">All</option>
              <option value="reel">Reel</option>
              <option value="short-video">Short Video</option>
              <option value="thread">Thread</option>
            </select>
          </div>

          <div class="control-group private-control">
            <label for="toneFilter">Tone</label>
            <select id="toneFilter">
              <option value="all">All</option>
              <option value="motivation">Motivation</option>
              <option value="authority">Authority</option>
              <option value="story">Story</option>
            </select>
          </div>

          <div class="control-group private-control">
            <label class="control-toggle" for="upcomingBookingsToggle">
              <input id="upcomingBookingsToggle" type="checkbox" />
              Voir seulement les RDV a venir
            </label>
          </div>

          <fieldset class="lang-toggle private-control" aria-label="Language toggle">
            <legend>Language</legend>
            <button type="button" class="lang-btn is-active" data-lang="fr">FR</button>
            <button type="button" class="lang-btn" data-lang="en">EN</button>
          </fieldset>

          <fieldset class="view-toggle private-control" aria-label="View mode toggle">
            <legend>View</legend>
            <button type="button" class="view-btn is-active" data-view="full">Full</button>
            <button type="button" class="view-btn" data-view="compact">Compact</button>
          </fieldset>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="composer private-only" aria-labelledby="composerTitle">
        <div class="composer__head">
          <h2 id="composerTitle">Ajouter une affiliation (V4)</h2>
          <p id="composerSubtitle">Les ajouts sont sauves localement dans ton navigateur (localStorage).</p>
          <button type="button" id="aiAssistantBtn" class="accent-ai composer__ai-btn">✦ Assistant IA</button>
        </div>

        <form id="affiliateForm" class="composer-form">
          <div class="quick-add-bar form-collaborator-only is-hidden">
            <button type="button" id="quickAddToggle">⚡ Mode rapide</button>
          </div>
          <div class="composer-grid">
            <label>
              Catégorie
              <select id="fCategory" name="category">
                <option value="affiliate">Affiliate</option>
                <option value="collaborator">Collaborator</option>
                <option value="event">Événement</option>
              </select>
            </label>

            <label class="quick-add-field">
              Nom
              <input id="fName" name="name" type="text" />
            </label>

            <label class="quick-add-field">
              URL principal
              <input id="fPrimaryUrl" name="primaryUrl" type="text" placeholder="https://..." />
            </label>

            <label class="form-affiliate-only">
              Code promo fan
              <input id="fPromoCode" name="promoCode" type="text" placeholder="MATT20" />
            </label>

            <label class="form-affiliate-only">
              URL social (optionnel)
              <input id="fSocialUrl" name="socialUrl" type="text" placeholder="https://..." />
            </label>

            <label class="form-collaborator-only is-hidden">
              Liens publics suppl&eacute;mentaires (un par ligne)
              <textarea id="fPublicLinks" name="publicLinks" rows="3" placeholder="https://onlyfans.com/...&#10;https://x.com/..."></textarea>
            </label>

            <label class="form-collaborator-only is-hidden">
              Liens prives (un par ligne)
              <textarea id="fPrivateLinks" name="privateLinks" rows="3" placeholder="https://...&#10;https://..."></textarea>
            </label>

            <label class="form-collaborator-only is-hidden">
              Contact
              <input id="fContact" name="contact" type="text" placeholder="email ou @handle" />
            </label>

            <label class="form-collaborator-only is-hidden">
              Email (privé)
              <input id="fEmail" name="email" type="email" placeholder="contact@exemple.com" autocomplete="off" />
            </label>

            <label class="form-collaborator-only is-hidden quick-add-field">
              Infos brutes a parser
              <textarea id="fSourceNotes" name="sourceNotes" rows="5" placeholder="Colle ici des messages, liens, emails, horaires..."></textarea>
            </label>

            <label class="form-collaborator-only is-hidden">
              Date booking
              <input id="fBookingDate" name="bookingDate" type="text" placeholder="25th" />
            </label>

            <label class="form-collaborator-only is-hidden">
              Heure booking
              <input id="fBookingTime" name="bookingTime" type="text" placeholder="11AM" />
            </label>

            <label class="form-collaborator-only is-hidden">
              Lieu booking
              <input id="fBookingLocation" name="bookingLocation" type="text" placeholder="Ritual Hotel" />
            </label>

            <label class="form-collaborator-only is-hidden">
              Rates / Conditions / Notes
              <textarea id="fRates" name="rates" rows="3" placeholder="Tarifs, disponibilite, conditions, note de booking..."></textarea>
            </label>

            <label>
              Logos (URLs, un par ligne)
              <textarea id="fLogos" name="logos" rows="3" placeholder="https://exemple.com/logo1.png&#10;https://exemple.com/logo2.png"></textarea>
            </label>

            <label>
              Images (URLs, une par ligne)
              <textarea id="fMediaImages" name="mediaImages" rows="3" placeholder="https://exemple.com/photo1.jpg&#10;https://exemple.com/photo2.jpg"></textarea>
            </label>

            <label>
              Vid&eacute;os (URLs, une par ligne)
              <textarea id="fMediaVideos" name="mediaVideos" rows="3" placeholder="https://exemple.com/video1.mp4&#10;https://exemple.com/video2.mp4"></textarea>
            </label>

            <label class="form-affiliate-only">
              Mentions @
              <input id="fMentions" name="mentions" type="text" placeholder="@compte @marque" />
            </label>
          </div>

          <div class="composer-grid composer-grid--2">
            <label>
              Tags
              <textarea id="fTags" name="tags" rows="3"></textarea>
            </label>
            <label>
              Specs
              <textarea id="fSpecs" name="specs" rows="5"></textarea>
            </label>
            <label>
              Caption
              <textarea id="fCaption" name="caption" rows="4"></textarea>
            </label>
            <label class="entity-affiliate-only">
              Demandes post (global)
              <textarea id="fPostRequirements" name="postRequirements" rows="4"></textarea>
            </label>
            <label class="entity-affiliate-only">
              Specificites (optionnel)
              <textarea id="fSpecificities" name="specificities" rows="4"></textarea>
            </label>
          </div>

          <div class="composer-actions">
            <button type="submit" id="submitAffiliateBtn" class="accent">Sauvegarder</button>
            <button type="button" id="cancelEditBtn" class="is-hidden">Annuler edition</button>
            <span id="formFeedback" aria-live="polite"></span>
          </div>


        </form>
      </section>

      <section id="cardsGrid" class="cards-grid" aria-live="polite"></section>
      <p id="emptyState" class="empty-state is-hidden">Aucun resultat pour ces filtres.</p>
      <p id="resultsInfo" class="results-info">Chargement...</p>
      <pre id="debugInfo" class="debug-info is-hidden" aria-live="polite"></pre>

      <section class="access-bar" aria-label="Access control">
        <label for="unlockInput">Acces admin</label>
        <input id="unlockInput" type="password" placeholder="Mot de passe admin" />
        <button type="button" id="unlockBtn">Deverrouiller</button>
        <button type="button" id="lockBtn" class="private-control">Quitter admin</button>
        <span id="accessStatus" aria-live="polite"></span>
      </section>
    </main>

    <template id="copyAllTemplate">
      Affiliate: {{name}}
Platform: {{platform}}
Niche: {{niche}}
Promo URL: {{primaryUrl}}
Promo code: {{promoCode}}
Mentions: {{mentions}}
Logos: {{logos}}
Demandes post: {{postRequirements}}
Specificites: {{specificities}}
Social URL: {{socialUrl}}

Tags:
{{tags}}

Specs:
{{specs}}

Caption:
{{caption}}
    </template>

    <template id="copyAllCollaboratorTemplate">
      Collaborator: {{name}}
Platform: {{platform}}
Niche: {{niche}}
Public link: {{primaryUrl}}
Private links: {{privateLinks}}
Contact: {{contact}}
Rates: {{rates}}
Booking: {{booking}}
Logos: {{logos}}

Tags:
{{tags}}

Specs:
{{specs}}

Caption:
{{caption}}
    </template>

    <script src="app.js"></script>
  </body>
</html>
